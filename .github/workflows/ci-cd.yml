name: React Frontend CI/CD Pipeline

# 1. Menentukan kapan robot ini harus berjalan
on:
  push:
    branches: [ "main", "master" ] # Robot jalan setiap kali kamu push ke branch main atau master
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # JOB PERTAMA: Validasi Kode & Testing
  validation-and-testing:
    runs-on: ubuntu-latest # Menjalankan robot di server Ubuntu milik GitHub

    steps:
    - name: Ambil Kode dari GitHub
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci # Perintah install yang lebih cepat dan ketat untuk lingkungan CI/CD

    - name: Cek Linting (Kerapian Kodingan)
      run: npm run lint --if-present

    - name: Jalankan Unit Test (Jika Ada)
      run: npm test --if-present

  # JOB KEDUA: Simulasi Build Docker (Hanya jalan kalau JOB PERTAMA sukses)
  docker-build-simulation:
    needs: validation-and-testing # Memastikan tes lolos dulu sebelum build
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari GitHub
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Simulasi Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false # Kita set false dulu karena kita belum koneksikan ke Cloud Storage/Registry beneran

  # JOB KETIGA: Otomatis Rilis ke Vercel (Hanya jalan kalau JOB PERTAMA & KEDUA sukses)
  deploy-to-vercel:
    needs: [validation-and-testing, docker-build-simulation]
    runs-on: ubuntu-latest
    steps:
    - name: Ambil Kode dari GitHub
      uses: actions/checkout@v4

    - name: Install Vercel CLI
      run: npm install --global vercel

    - name: Tarik Informasi Environment Vercel
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Build Aset Production di Vercel
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Deploy Hasil Build ke Vercel Live Production
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}